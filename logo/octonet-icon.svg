<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#0f172a"/>

  <!-- Body -->
  <ellipse cx="128" cy="95" rx="50" ry="42" fill="url(#bg)" opacity="0.9"/>

  <!-- Eyes -->
  <ellipse cx="112" cy="88" rx="12" ry="13" fill="white"/>
  <ellipse cx="144" cy="88" rx="12" ry="13" fill="white"/>
  <circle cx="114" cy="86" r="6" fill="#0f172a"/>
  <circle cx="146" cy="86" r="6" fill="#0f172a"/>
  <circle cx="116" cy="84" r="2.5" fill="white"/>
  <circle cx="148" cy="84" r="2.5" fill="white"/>

  <!-- Smile -->
  <path d="M 115 105 Q 128 114 141 105" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right tentacles (DB — green) -->
  <path d="M 165 115 Q 195 105 220 85" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 168 125 Q 200 130 225 120" fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 165 138 Q 195 155 220 155" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 155 150 Q 180 175 210 185" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>

  <!-- Left tentacles (Transport — orange) -->
  <path d="M 90 115 Q 60 105 35 85" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 88 125 Q 55 130 30 120" fill="none" stroke="#ea580c" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 90 138 Q 60 155 35 155" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 100 150 Q 75 175 45 185" fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>

  <!-- Text -->
  <text x="128" y="215" text-anchor="middle" font-size="24" font-weight="900" fill="white" font-family="Arial,sans-serif">OctoNet</text>
  <text x="128" y="235" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="Arial,sans-serif">13 DBs × 11 Transports</text>
</svg>
